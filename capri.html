<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capri — waichapa</title>
<link rel="icon" href="favicon-32x32.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <a href="projects.html" style="color:var(--primary);font-weight:700;font-size:.9rem" data-i18n="back_to_projects">← Back to Projects</a>

  <div class="card project-hero">
    <img src="assets/image.png" alt="Capri" style="opacity:.75">
    <div>
      <h1>🖱️ Capri</h1>
      <p class="tagline" data-i18n="capri_tagline"></p>
      <div class="repo-meta">
        <span>📦 waichapa/Capri</span>
        <span data-i18n="capri_license">License: MIT</span>
        <span>C# 100%</span>
        <span>v0.1.0</span>
      </div>
    </div>
  </div>

  <div class="card">
    <p style="font-size:1.02rem" data-i18n="capri_full_desc"></p>
    <a class="btn" href="https://github.com/waichapa/Capri" target="_blank" rel="noopener" data-i18n="view_github">View on GitHub</a>
  </div>

  <div class="card">
    <h2 data-i18n="capri_features_title">Features</h2>
    <div class="feature-grid">
      <div class="feature-item"><div class="emoji">🖱️</div><h4 data-i18n="capri_f1_t"></h4><p data-i18n="capri_f1_d"></p></div>
      <div class="feature-item"><div class="emoji">🤖</div><h4 data-i18n="capri_f2_t"></h4><p data-i18n="capri_f2_d"></p></div>
      <div class="feature-item"><div class="emoji">🎯</div><h4 data-i18n="capri_f3_t"></h4><p data-i18n="capri_f3_d"></p></div>
      <div class="feature-item"><div class="emoji">↩️</div><h4 data-i18n="capri_f4_t"></h4><p data-i18n="capri_f4_d"></p></div>
      <div class="feature-item"><div class="emoji">🔗</div><h4 data-i18n="capri_f5_t"></h4><p data-i18n="capri_f5_d"></p></div>
      <div class="feature-item"><div class="emoji">🪶</div><h4 data-i18n="capri_f6_t"></h4><p data-i18n="capri_f6_d"></p></div>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="capri_req_title">Requirements</h2>
    <ul>
      <li data-i18n="capri_req_1"></li>
      <li data-i18n="capri_req_2"></li>
      <li data-i18n="capri_req_3"></li>
    </ul>
  </div>

  <div class="card">
    <h2 data-i18n="capri_usage_title">Usage</h2>
    <ol class="step-list">
      <li data-i18n="capri_step1"></li>
      <li data-i18n="capri_step2"></li>
      <li data-i18n="capri_step3"></li>
      <li data-i18n="capri_step4"></li>
    </ol>
  </div>

  <div class="card">
    <h2 data-i18n="capri_stack_title">Tech Stack</h2>
    <div class="stack-row">
      <span class="tech-pill">.NET 10</span>
      <span class="tech-pill">C#</span>
      <span class="tech-pill">Avalonia UI</span>
      <span class="tech-pill">win2xcur</span>
    </div>
    <div class="code-block">~/.local/share/icons/&lt;active-theme&gt;/cursors/</div>
  </div>
</div>

<div id="app-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/theme.js"></script>
<script src="js/common.js"></script>
<script>
  renderHeader('projects');
  renderFooter();
  document.addEventListener('langChanged', () => { renderHeader('projects'); renderFooter(); });
</script>
</body>
</html>
