<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>waichapa · 한국어 단어장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #11141C;
            --bg-card: #1A1F2B;
            --bg-card-deep: #151922;
            --gold: #E8794B;
            --gold-soft: #D2643A;
            --jade: #5FBFA6;
            --seal: #C23B4E;
            --text: #EDEFF5;
            --text-soft: #8C93A6;
            --border-hair: rgba(232,121,75,0.18);
            --shadow-soft: 0 10px 28px rgba(0,0,0,0.45);
            --shadow-lift: 0 18px 40px rgba(0,0,0,0.55);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        .kr {
            font-family: 'Gowun Batang', serif;
        }

        .app {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 24px 90px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: linear-gradient(165deg, var(--bg-card), var(--bg-card-deep));
            border: 1px solid var(--border-hair);
            border-radius: 30px 12px 30px 12px;
            padding: 22px 28px;
            box-shadow: var(--shadow-soft);
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 260px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--gold), var(--gold-soft));
            color: #1A1712;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Gowun Batang',serif;
            font-size: 25px;
            flex-shrink: 0;
            object-fit: cover;
            box-shadow: 0 0 0 3px var(--bg), 0 0 0 4px var(--border-hair), 0 6px 16px rgba(205,164,95,0.35);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 200px;
        }

        .profile-name {
            font-weight: 800;
            font-size: 18.5px;
            letter-spacing: .3px;
            color: var(--text);
        }

        .profile-stats {
            font-size: 13px;
            color: var(--text-soft);
        }

            .profile-stats b {
                color: var(--gold);
                font-weight: 800;
            }

        .lang-switch {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.28);
            border: 1px solid var(--border-hair);
            padding: 6px;
            border-radius: 999px;
        }

        .lang-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 999px;
            font-family: 'Manrope',sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: .2s;
        }

            .lang-btn .flag {
                font-size: 16px;
            }

            .lang-btn.active {
                background: linear-gradient(165deg, rgba(205,164,95,0.22), rgba(205,164,95,0.08));
                color: var(--gold);
                box-shadow: inset 0 0 0 1px rgba(205,164,95,0.3);
            }

        .search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 28px 0 22px;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-hair);
            border-radius: 18px;
            padding: 13px 18px;
            box-shadow: var(--shadow-soft);
            transition: box-shadow .2s, border-color .2s;
        }

            .search-box:focus-within {
                border-color: rgba(205,164,95,0.5);
                box-shadow: var(--shadow-soft), 0 0 0 3px rgba(205,164,95,0.12);
            }

            .search-box input {
                flex: 1;
                border: none;
                outline: none;
                font-family: 'Manrope',sans-serif;
                font-size: 15px;
                background: transparent;
                color: var(--text);
            }

                .search-box input::placeholder {
                    color: var(--text-soft);
                }

            .search-box svg {
                flex-shrink: 0;
                opacity: .55;
                color: var(--gold);
            }

        .result-count {
            font-size: 13px;
            color: var(--text-soft);
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
            gap: 16px;
        }

        .word-card {
            position: relative;
            background: linear-gradient(170deg, var(--bg-card), var(--bg-card-deep));
            border: 1px solid var(--border-hair);
            border-radius: 26px 12px 26px 12px;
            padding: 20px 18px 18px;
            box-shadow: var(--shadow-soft);
            transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
            overflow: hidden;
        }

            .word-card::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(120deg, transparent 40%, rgba(205,164,95,0.05) 50%, transparent 60%);
                pointer-events: none;
            }

            .word-card:hover {
                transform: translateY(-3px);
                box-shadow: var(--shadow-lift);
                border-color: rgba(205,164,95,0.35);
            }

        .word-kr {
            font-family: 'Gowun Batang',serif;
            font-size: 25px;
            line-height: 1.25;
            margin: 0 0 6px;
            color: var(--text);
        }

        .word-tr {
            font-size: 13.5px;
            color: var(--text-soft);
            margin: 0;
        }

        .seal {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #DE5C68, var(--seal));
            color: #FCEBEA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Gowun Batang',serif;
            font-size: 12px;
            box-shadow: 0 3px 10px rgba(194,59,78,.45);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-soft);
            grid-column: 1/-1;
        }

            .empty-state .big-kr {
                font-family: 'Gowun Batang',serif;
                font-size: 40px;
                display: block;
                margin-bottom: 10px;
                color: var(--gold);
            }

        @media (max-width:640px) {
            .header {
                padding: 18px;
            }

            .profile {
                min-width: auto;
                width: 100%;
            }

            .lang-switch {
                width: 100%;
                justify-content: space-between;
            }

            .lang-btn {
                padding: 8px 8px;
                font-size: 12px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
            }

            .word-kr {
                font-size: 21px;
            }
        }

        :focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="app">

        <div class="header">
            <div class="profile">
                <img class="avatar" id="avatar" src="image.png" alt="waichapa">
                <div class="profile-info">
                    <div class="profile-name">waichapa</div>
                    <div class="profile-stats" id="statsText"></div>
                </div>
            </div>
            <div class="lang-switch" id="langSwitch">
                <button class="lang-btn" data-lang="ko"><span class="flag">🇰🇷</span><span>한국어</span></button>
                <button class="lang-btn" data-lang="ru"><span class="flag">🇷🇺</span><span>Русский</span></button>
                <button class="lang-btn" data-lang="en"><span class="flag">🇬🇧</span><span>English</span></button>
            </div>
        </div>

        <div class="search-row">
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                <input type="text" id="searchInput" placeholder="">
            </div>
            <div class="result-count" id="resultCount"></div>
        </div>

        <div class="grid" id="dictGrid"></div>

    </div>

    <script>
        let DICTIONARY = [];

        const STR = {
            ru: {
                searchPlaceholder: "Поиск слова или перевода…",
                resultCount: n => `${n} слов`,
                statsText: t => `Выучено слов: <b>${t}</b>`,
                noResults: "Ничего не найдено"
            },
            en: {
                searchPlaceholder: "Search a word or translation…",
                resultCount: n => `${n} words`,
                statsText: t => `Words learned: <b>${t}</b>`,
                noResults: "No matches found"
            },
            ko: {
                searchPlaceholder: "단어나 번역을 검색하세요…",
                resultCount: n => `${n}개 단어`,
                statsText: t => `외운 단어: <b>${t}</b>개`,
                noResults: "검색 결과 없음"
            }
        };

        let currentLang = "ru";
        function t() { return STR[currentLang]; }

        function renderHeader() {
            document.getElementById("statsText").innerHTML = t().statsText(DICTIONARY.length);
        }

        function renderGrid() {
            const query = (document.getElementById("searchInput").value || "").trim().toLowerCase();
            const grid = document.getElementById("dictGrid");
            grid.innerHTML = "";
            const filtered = DICTIONARY.filter(w => {
                if (!query) return true;
                return w.Korean.toLowerCase().includes(query) || w.English.toLowerCase().includes(query);
            });
            document.getElementById("resultCount").textContent = t().resultCount(filtered.length);
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state"><span class="big-kr">검색 결과 없음</span>${t().noResults}</div>`;
                return;
            }
            const frag = document.createDocumentFragment();
            filtered.forEach(w => {
                const card = document.createElement("div");
                card.className = "word-card";
                card.innerHTML = `
          <div class="seal">${currentLang === "ko" ? "印" : "✓"}</div>
          <div class="word-kr">${w.Korean}</div>
          <div class="word-tr">${w.English}</div>
        `;
                frag.appendChild(card);
            });
            grid.appendChild(frag);
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
            document.getElementById("searchInput").placeholder = t().searchPlaceholder;
            renderHeader();
            renderGrid();
        }

        document.getElementById("langSwitch").addEventListener("click", e => {
            const btn = e.target.closest(".lang-btn");
            if (btn) setLang(btn.dataset.lang);
        });
        document.getElementById("searchInput").addEventListener("input", renderGrid);

        async function init() {
            try {
                const res = await fetch("dictionary.json");
                if (!res.ok) throw new Error("HTTP " + res.status);
                DICTIONARY = await res.json();
                DICTIONARY.forEach((w, i) => w.id = i);
                setLang("ru");
            } catch (err) {
                document.getElementById("dictGrid").innerHTML =
                    `<div class="empty-state"><span class="big-kr">오류</span>
           Не удалось загрузить dictionary.json. Открой страницу через локальный сервер
           (например, VS Code Live Server) или через GitHub Pages — браузеры блокируют
           fetch() для файлов, открытых напрямую с диска.</div>`;
                document.getElementById("statsText").textContent = "—";
            }
        }
        init();
    </script>
</body>
</html>
