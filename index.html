<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>waichapa · 한국어 단어장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        /* Apply saved / preferred theme before paint to avoid a flash */
        (function () {
            try {
                var saved = localStorage.getItem("waichapa-theme");
                var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="profile">
                <img class="avatar" id="avatar" src="image.png" alt="waichapa">
                <div class="profile-info">
                    <div class="profile-name">waichapa</div>
                    <div class="profile-stats" id="statsText"></div>
                </div>
            </div>

            <div class="header-controls">
                <div class="lang-switch" id="langSwitch">
                    <button class="lang-btn" data-lang="ko"><span class="flag">🇰🇷</span><span>한국어</span></button>
                    <button class="lang-btn active" data-lang="ru"><span class="flag">🇷🇺</span><span>Русский</span></button>
                    <button class="lang-btn" data-lang="en"><span class="flag">🇬🇧</span><span>English</span></button>
                </div>

                <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="4.4"/>
                        <line x1="12" y1="1.8" x2="12" y2="4.4"/>
                        <line x1="12" y1="19.6" x2="12" y2="22.2"/>
                        <line x1="4.5" y1="4.5" x2="6.3" y2="6.3"/>
                        <line x1="17.7" y1="17.7" x2="19.5" y2="19.5"/>
                        <line x1="1.8" y1="12" x2="4.4" y2="12"/>
                        <line x1="19.6" y1="12" x2="22.2" y2="12"/>
                        <line x1="4.5" y1="19.5" x2="6.3" y2="17.7"/>
                        <line x1="17.7" y1="6.3" x2="19.5" y2="4.5"/>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.6 15.2A8.6 8.6 0 0 1 9 3.6a.6.6 0 0 0-.8-.7A9.4 9.4 0 1 0 21.3 16a.6.6 0 0 0-.7-.8z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="dict">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                <span id="tabDictLabel">Словарь</span>
            </button>
            <button class="tab-btn" data-tab="quiz">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.2a2.5 2.5 0 0 1 4.9.8c0 1.7-2.4 1.9-2.4 3.5"/><line x1="12" y1="17" x2="12" y2="17.1"/></svg>
                <span id="tabQuizLabel">Квиз</span>
            </button>
            <button class="tab-btn" data-tab="stats">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="21" x2="5" y2="11"/><line x1="12" y1="21" x2="12" y2="6"/><line x1="19" y1="21" x2="19" y2="14"/></svg>
                <span id="tabStatsLabel">Статистика</span>
            </button>
        </div>

        <section class="tab-panel active" id="panel-dict">
            <div class="search-row">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                    <input type="text" id="searchInput" placeholder="Поиск слова или перевода…">
                </div>
                <button class="new-filter" id="newFilter" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2l2.1 6.5H21l-5.5 4 2.1 6.5-5.6-4-5.6 4 2.1-6.5L3 8.5h6.9z"/>
                    </svg>
                    <span id="newFilterLabel">Новые</span>
                </button>
                <div class="result-count" id="resultCount"></div>
            </div>

            <div class="grid" id="dictGrid"></div>
        </section>

        <section class="tab-panel" id="panel-quiz">
            <div class="quiz-wrap">
                <div class="quiz-score" id="quizScore"></div>
                <div class="quiz-card" id="quizCard">
                    <div class="quiz-prompt-label" id="quizPromptLabel"></div>
                    <div class="quiz-prompt" id="quizPrompt"></div>
                    <div class="quiz-options" id="quizOptions"></div>
                    <div class="quiz-feedback" id="quizFeedback"></div>
                    <button class="quiz-next" id="quizNext" type="button"></button>
                </div>
            </div>
        </section>

        <section class="tab-panel" id="panel-stats">
            <div class="stats-grid" id="statsGrid"></div>
        </section>
    </div>


    <script src="script.js"></script>
</body>
</html>
