<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minji — waichapa</title>
<link rel="icon" href="favicon-32x32.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <a href="projects.html" style="color:var(--primary);font-weight:700;font-size:.9rem" data-i18n="back_to_projects">← Back to Projects</a>

  <div class="card project-hero">
    <img src="assets/minji-avatar.png" alt="Minji">
    <div>
      <h1>🌸 Minji</h1>
      <p class="tagline" data-i18n="minji_tagline"></p>
      <div class="repo-meta">
        <span>📦 waichapa/minji</span>
        <span data-i18n="minji_license">License: MIT</span>
        <span>C# 100%</span>
      </div>
    </div>
  </div>

  <div class="card">
    <p style="font-size:1.02rem" data-i18n="minji_full_desc"></p>
    <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1519065491769921596&scope=bot%20applications.commands&permissions=0" target="_blank" rel="noopener" data-i18n="minji_invite">Invite Minji to your Server</a>
    <a class="btn outline" href="https://github.com/waichapa/minji" target="_blank" rel="noopener" data-i18n="view_github">View on GitHub</a>
  </div>

  <div class="card">
    <h2 data-i18n="minji_features_title">Key Features</h2>
    <div class="feature-grid">
      <div class="feature-item"><div class="emoji">🧠</div><h4 data-i18n="minji_f1_t"></h4><p data-i18n="minji_f1_d"></p></div>
      <div class="feature-item"><div class="emoji">📚</div><h4 data-i18n="minji_f2_t"></h4><p data-i18n="minji_f2_d"></p></div>
      <div class="feature-item"><div class="emoji">📝</div><h4 data-i18n="minji_f3_t"></h4><p data-i18n="minji_f3_d"></p></div>
      <div class="feature-item"><div class="emoji">💬</div><h4 data-i18n="minji_f4_t"></h4><p data-i18n="minji_f4_d"></p></div>
      <div class="feature-item"><div class="emoji">🎭</div><h4 data-i18n="minji_f5_t"></h4><p data-i18n="minji_f5_d"></p></div>
      <div class="feature-item"><div class="emoji">🇰🇷</div><h4 data-i18n="minji_f6_t"></h4><p data-i18n="minji_f6_d"></p></div>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="minji_admin_title">For Server Admins</h2>
    <ul>
      <li data-i18n="minji_admin_1"></li>
      <li data-i18n="minji_admin_2"></li>
      <li data-i18n="minji_admin_3"></li>
    </ul>
  </div>

  <div class="card">
    <h2 data-i18n="minji_start_title">Quick Start</h2>
    <ol class="step-list">
      <li data-i18n="minji_step1"></li>
      <li data-i18n="minji_step2"></li>
      <li data-i18n="minji_step3"></li>
      <li data-i18n="minji_step4"></li>
      <li data-i18n="minji_step5"></li>
    </ol>
  </div>

  <div class="card">
    <h2 data-i18n="minji_stack_title">Tech Stack</h2>
    <div class="stack-row">
      <span class="tech-pill">.NET 10</span>
      <span class="tech-pill">C#</span>
      <span class="tech-pill">Discord.Net</span>
      <span class="tech-pill">Microsoft.Data.Sqlite</span>
      <span class="tech-pill">OpenAI API</span>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/theme.js"></script>
<script src="js/common.js"></script>
<script>
  renderHeader('projects');
  renderFooter();
  document.addEventListener('langChanged', () => { renderHeader('projects'); renderFooter(); });
</script>
</body>
</html>
