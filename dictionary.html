<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>waichapa — Dictionary</title>
<link rel="icon" href="favicon-32x32.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-header"></div>

<div class="container">
  <h1 data-i18n="dict_title">Dictionary & Grammar Database</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dict" data-i18n="tab_dict">Dictionary</button>
    <button class="tab-btn" data-tab="grammar" data-i18n="tab_grammar">Grammar</button>
  </div>

  <div id="tab-dict" class="tab-content active">
    <div class="search-bar">
      <input type="text" id="dictSearch" data-i18n-placeholder="search_placeholder" placeholder="Search word / meaning / tag...">
      <select id="tagFilter"></select>
    </div>
    <div class="quick-filters" id="quickFilters"></div>
    <div id="dictList" class="word-list"></div>
  </div>

  <div id="tab-grammar" class="tab-content">
    <div class="search-bar">
      <input type="text" id="grammarSearch" data-i18n-placeholder="search_placeholder" placeholder="Search grammar...">
    </div>
    <div id="grammarList"></div>
  </div>
</div>

<div id="app-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/theme.js"></script>
<script src="js/common.js"></script>
<script src="js/dictionary-app.js"></script>
<script>
  renderHeader('dictionary');
  renderFooter();
  document.addEventListener('langChanged', () => { renderHeader('dictionary'); renderFooter(); renderDict(); renderGrammar(); });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    };
  });
</script>
</body>
</html>
